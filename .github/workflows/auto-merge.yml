name: Auto-merge

# Automatically lands PRs opened by trusted bots so the solo maintainer
# doesn't have to click buttons for routine dependency bumps.
#
# Dependabot PRs are approved by github-actions[bot] and then queued
# for auto-merge once required status checks pass.
#
# NOTE: This relies on the repository ruleset / branch protection
# configuration allowing administrators (or the GitHub Actions app)
# to bypass pull-request requirements.

on:
  pull_request_target:
    types:
      - opened
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Dependabot auto-merge
    runs-on: ubuntu-22.04
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Approve and enable auto-merge
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
