name: Scorecard supply-chain security

# OpenSSF Scorecard runs ~20 automated checks against this repo's
# supply-chain posture (branch protection, signed commits, pinned
# dependencies, …) and publishes the result. The badge in README.md
# reads from the public dashboard at:
#   https://securityscorecards.dev/viewer/?uri=github.com/oly-wan-kenobi/zvec-rs
#
# The workflow uploads SARIF results to GitHub's code-scanning UI,
# so any regressions show up under the repo's Security tab.

on:
  branch_protection_rule:
  schedule:
    # Weekly is enough — score changes are slow.
    - cron: "0 6 * * 1"
  push:
    branches: ["main"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to code-scanning.
      security-events: write
      # Needed for OIDC publish to the public dashboard.
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the OpenSSF dashboard so the README badge has
          # something to read. Public badge requires a public repo,
          # which this is.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
