name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # zvec ref whose c_api.h is vendored in this repo. When bumping
  # `vendor/c_api.h`, bump this too.
  ZVEC_REF: v0.3.1
  # Feature combination CI exercises. Bump as new optional features
  # land so they get built + tested on every PR.
  FEATURES: "bundled serde-json half tokio derive"

jobs:
  bundled-feature:
    name: bundled feature (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    # Downloads upstream's prebuilt libzvec_c_api from the PyPI wheel,
    # then exercises the full Rust surface (rustfmt, clippy, tests) end
    # to end. This is the gate every PR must pass.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Install libclang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libclang-dev clang
      # macOS runners ship a working clang / libclang out of the box.

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy (--features "${{ env.FEATURES }}")
        run: cargo clippy --no-default-features --features "${{ env.FEATURES }}" --all-targets --no-deps -- -D warnings

      - name: Build (--features "${{ env.FEATURES }}")
        run: cargo build --no-default-features --features "${{ env.FEATURES }}" --verbose

      - name: Test (--features "${{ env.FEATURES }}")
        shell: bash
        run: |
          # Point the dynamic-library search path at the wheel extraction dir
          # that build.rs populated under OUT_DIR. On macOS that variable is
          # DYLD_FALLBACK_LIBRARY_PATH; on Linux it's LD_LIBRARY_PATH.
          LIB_DIR=$(ls -d target/debug/build/zvec-*/out/zvec-bundled/lib | head -1)
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export DYLD_FALLBACK_LIBRARY_PATH="$LIB_DIR"
          else
            export LD_LIBRARY_PATH="$LIB_DIR"
          fi
          cargo test --no-default-features --features "${{ env.FEATURES }}" --verbose

      - name: Rustdoc (-D warnings)
        # Catch broken intra-doc links + missing-doc lints before they
        # reach docs.rs. We don't pass `--cfg docsrs` here because that
        # activates `#![feature(doc_cfg)]` which only compiles on
        # nightly; docs.rs itself does build under nightly. CI on
        # stable just verifies the prose is clean.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-default-features --features "${{ env.FEATURES }}" --no-deps

  msrv:
    name: MSRV (rust-toolchain pinned in Cargo.toml)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: write
    # Confirms the `rust-version = "1.75"` pin in Cargo.toml still
    # builds. Only checks compilation (no tests / clippy / fmt) — the
    # bundled-feature matrix above has the full coverage on stable.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read MSRV from Cargo.toml
        id: msrv
        shell: bash
        run: |
          set -euo pipefail
          MSRV=$(grep -m1 '^rust-version = ' Cargo.toml | cut -d'"' -f2)
          echo "version=$MSRV" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libclang-dev clang

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo check (--features "${{ env.FEATURES }}")
        run: cargo check --no-default-features --features "${{ env.FEATURES }}" --all-targets
